enable_xformers_memory_efficient_attention: true
inference_config:
  diversity_rand_ratio: 0.1
mixed_precision: fp16
output_dir_origin: ./results/a2w
pretrained_model_path: ./pretrained_ckpt/stable-diffusion-v1-5
seed: 42
validation_data:
  attention_adapt_step: 50
  attention_type_former:
  - self
  - first
  - former
  attention_type_latter:
  - self
  guidance_scale: 5.5
  height: 512
  use_inv_latent: true
  width: 512
  interpolate_k: 0
  negative_prompt: longbody, lowres, bad anatomy, bad hands, missing fingers, extra
    digit, fewer difits, cropped, worst quality, low quality, deformed body, bloated,
    ugly, unrealistic
  num_inference_steps: 50
  num_inv_steps: 50
  
  t1: 48
  binding_steps: 25
  num_intervention_steps: 49
  gome: 'yes' #yes,no
  noise_sampling_method: vanilla #vanilla, pyoco_mixed, pyoco_progressive

  test_dataset:
    '10':
      Visual elaboration: 'Generate a high-resolution satellite view video that illustrates the season changing from
        autumn to winter: The scene depicts a region undergoing rapid urban expansion,
        likely in a subtropical or temperate zone. The landscape includes clusters of
        residential buildings, road networks, agricultural fields, and patches of dense
        vegetation.'
      name: '10'
      prompts:
      - 'A high-resolution satellite view: Urban expansion region, residential buildings, road
        networks, agricultural fields, and dense vegetation under a golden, vibrant
        sun during a warm early autumn.'
      - 'A high-resolution satellite view: Urban expansion region, residential buildings, road
        networks, agricultural fields, and dense vegetation under a hazy, orange sky
        during a breezy mid autumn.'
      - 'A high-resolution satellite view: Urban expansion region, residential buildings, road
        networks, agricultural fields, and dense vegetation under a grey, overcast sky
        with falling late autumn leaves.'
      - 'A high-resolution satellite view: Urban expansion region, residential buildings, road
        networks, agricultural fields, and dense vegetation under a cold sky with a
        light early winter frost.'
      - 'A high-resolution satellite view: Urban expansion region, residential buildings, road
        networks, agricultural fields, and dense vegetation dusted by a thin layer of
        cold winter snow.'
      - 'A high-resolution satellite view: Urban expansion region, residential buildings, road
        networks, agricultural fields, and dense vegetation covered in a heavy, pristine
        coat of white winter snow.'
      - 'A high-resolution satellite view: Urban expansion region, residential buildings, road
        networks, agricultural fields, and dense vegetation featuring frozen patches
        of ice and hardened winter snow.'
      - 'A high-resolution satellite view: Urban expansion region, residential buildings, road
        networks, agricultural fields, and dense vegetation under a biting, pale blue
        sky with melting winter slush.'
    '118':
      Visual elaboration: 'Generate a video that illustrates the season changing from
        autumn to winter: The video presents an aerial view of a coastal urban area
        bordered by large rock formations and a wide bay. The scene includes a prominent,
